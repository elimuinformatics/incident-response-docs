name: Deploy docs

# Build the MkDocs site and publish it to the gh-pages branch on every push to
# master. GitHub Pages is configured to serve from gh-pages, so this keeps the
# live site (response.elimuinformatics.com) in sync with the docs source.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build and deploy to gh-pages
        run: mkdocs gh-deploy --force --message "Deploy docs from ${GITHUB_SHA::7} [skip ci]"
